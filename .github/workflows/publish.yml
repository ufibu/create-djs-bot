name: publish
on: push

jobs:
  test:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Checkout 🛎
        uses: actions/checkout@v6

      - name: Semantic Release 🚀
        uses: cycjimmy/semantic-release-action@v6
        with:
          branch: main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}